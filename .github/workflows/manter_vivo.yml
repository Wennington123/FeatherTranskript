name: Manter Streamlit Acordado (Playwright)

on:
  schedule:
    - cron: '0 */4 * * *'   # a cada 4 horas
  workflow_dispatch:          # execução manual

jobs:
  wake-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Playwright e dependências
        run: |
          pip install playwright
          playwright install chromium

      - name: Executar script de wake
        env:
          STREAMLIT_URL: "https://feathertranskriptweb.streamlit.app/"
        run: python wake_app.py
