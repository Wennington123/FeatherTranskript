name: Manter Streamlit Acordado (Playwright)

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  wake-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install playwright
      - run: playwright install chromium
      - name: Run wake script
        env:
          STREAMLIT_URL: "https://feathertranskriptweb.streamlit.app/"
        run: python wake_app.py
