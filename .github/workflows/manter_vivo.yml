name: Manter Streamlit Acordado

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping-app:
    runs-on: ubuntu-latest
    steps:
      - name: Ping no aplicativo Streamlit
        run: |
          URL="https://feathertranskriptweb.streamlit.app/"
          echo "🔄 Visitando $URL ..."
          # Faz requisição HEAD e ignora o código de status (apenas queremos que o servidor acorde)
          curl -I -s --max-time 60 \
            -H "User-Agent: Mozilla/5.0" \
            -o /dev/null \
            "$URL"
          echo "✅ Ping enviado com sucesso (independente do código HTTP)"
          # Sempre sai com 0, pois o objetivo é apenas gerar tráfego
