name: Manter Streamlit Acordado

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping-app:
    runs-on: ubuntu-latest
    steps:
      - name: Ping no aplicativo Streamlit
        run: |
          URL="https://feathertranskriptweb.streamlit.app/"
          echo "🔄 Visitando $URL com HEAD request..."
          HTTP_CODE=$(curl -I -s -o /dev/null -w "%{http_code}" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "$URL")
          echo "✅ Código HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 200 ] && [ "$HTTP_CODE" -ne 302 ] && [ "$HTTP_CODE" -ne 301 ]; then
            echo "⚠️ Resposta inesperada: $HTTP_CODE"
            exit 1
          fi
